    document.getElementById('planBtn').addEventListener('click', async () => {
      out.textContent = 'Planning...';
      const prompt = document.getElementById('prompt').value;
      const r = await fetch('/api/plan', {
        method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ prompt })
      });
      const data = await r.json();
      currentPlanId = data.plan_id || null;
      planid.textContent = currentPlanId || '(none)';
      out.textContent = JSON.stringify(data, null, 2);
    });

    document.getElementById('execBtn').addEventListener('click', async () => {
      out.textContent = 'Executing...';
      if (!currentPlanId) {
        out.textContent = 'Create a plan first.';
        return;
      }
      const approved = document.getElementById('approve').checked;
      const dry_run = document.getElementById('dry').checked;
      const r = await fetch('/api/execute', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ plan_id: currentPlanId, approved, dry_run })
      });
      out.textContent = JSON.stringify(await r.json(), null, 2);
    });

    loadCaps();
    loadMacros();
  </script>
