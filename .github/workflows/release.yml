name: Build and publish release binaries

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build tools and project dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build pyinstaller
          pip install -e ".[gui]"
        shell: bash

      - name: Build wheel and sdist
        if: runner.os == 'Linux'
        run: python -m build --sdist --wheel
        shell: bash

      - name: Build GUI binary
        run: |
          mkdir -p release
          pyinstaller --onefile --name llm-r-gui-${{ runner.os }} gui/pyqt_app.py --distpath release --workpath build/pyinstaller
        shell: bash

      - name: Build server binary
        run: |
          mkdir -p release
          pyinstaller --onefile --name llm-r-server-${{ runner.os }} backend/main.py --distpath release --workpath build/pyinstaller
        shell: bash

      - name: List artifacts
        run: |
          echo "dist contents:"
          ls -la dist || true
          echo "release contents:"
          ls -la release || true
        shell: bash

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            dist
            release

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded

      - name: List downloaded artifacts
        run: find downloaded -type f | sort

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: downloaded/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
